<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Kawasaki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .confirmation-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .order-number {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 18px;
        }
        .payment-method {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .payment-method:hover {
            border-color: #00ff00;
            background: #f0fff0;
        }
        .payment-method.selected {
            border-color: #00ff00;
            background: #e8f5e9;
        }
        .btn-pay {
            background: #28a745;
            color: white;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn-pay:hover { background: #218838; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-motorcycle"></i> KAWASAKI</a>
        </div>
    </nav>

    <div class="container">
        <div class="confirmation-card">
            <div class="success-icon">
                <i class="fas fa-shopping-cart"></i>
            </div>
            <h2>Order Summary</h2>
            <p class="text-muted">Please review your order before payment</p>
            
            <div class="row mt-4">
                <div class="col-md-8 offset-md-2">
                    <div class="order-number">
                        <strong>Order ID: </strong> <span id="orderId">#ORD001</span>
                    </div>
                    
                    <div class="mt-4">
                        <h5>Order Items</h5>
                        <div id="orderItems" class="list-group mt-3"></div>
                        
                        <div class="mt-3 p-3 bg-light rounded">
                            <div class="d-flex justify-content-between">
                                <strong>Total Amount:</strong>
                                <strong class="text-success">₹<span id="totalAmount">0</span></strong>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <h5>Select Payment Method</h5>
                        <div class="payment-method" onclick="selectPayment('card')" id="payCard">
                            <i class="fas fa-credit-card"></i> Credit/Debit Card
                        </div>
                        <div class="payment-method" onclick="selectPayment('upi')" id="payUpi">
                            <i class="fas fa-mobile-alt"></i> UPI (Google Pay, PhonePe)
                        </div>
                        <div class="payment-method" onclick="selectPayment('cod')" id="payCod">
                            <i class="fas fa-rupee-sign"></i> Cash on Delivery
                        </div>
                    </div>
                    
                    <button class="btn-pay" onclick="processPayment()" id="payBtn">
                        <i class="fas fa-lock"></i> Pay Now
                    </button>
                    
                    <p class="text-muted small mt-3">
                        <i class="fas fa-shield-alt"></i> Secure payment guaranteed
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('kawasakiCart')) || [];
        let selectedPayment = 'card';
        let orderIds = [];
        
        function selectPayment(method) {
            selectedPayment = method;
            document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('selected'));
            if (method === 'card') document.getElementById('payCard').classList.add('selected');
            else if (method === 'upi') document.getElementById('payUpi').classList.add('selected');
            else if (method === 'cod') document.getElementById('payCod').classList.add('selected');
        }
        
        function displayOrderSummary() {
            let total = 0;
            let html = '';
            
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-0">${item.name}</h6>
                            <small class="text-muted">Quantity: ${item.quantity} × ₹${item.price}</small>
                        </div>
                        <div class="text-success fw-bold">₹${itemTotal}</div>
                    </div>
                `;
            });
            
            document.getElementById('orderItems').innerHTML = html;
            document.getElementById('totalAmount').innerText = total;
            
            // Generate random order ID
            const orderId = 'KAW' + Date.now() + Math.floor(Math.random() * 1000);
            document.getElementById('orderId').innerText = orderId;
        }
        
        async function processPayment() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                window.location.href = '/parts';
                return;
            }
            
            const payBtn = document.getElementById('payBtn');
            const originalText = payBtn.innerHTML;
            payBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing Payment...';
            payBtn.disabled = true;
            
            // Save orders to database first
            let savedOrders = [];
            let errors = false;
            
            for (let item of cart) {
                try {
                    const response = await fetch('/api/place_order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            product_name: item.name,
                            quantity: item.quantity,
                            price: item.price,
                            payment_method: selectedPayment
                        })
                    });
                    const data = await response.json();
                    if (data.success) {
                        savedOrders.push(data.order_id);
                    } else {
                        errors = true;
                    }
                } catch (error) {
                    console.error('Error:', error);
                    errors = true;
                }
            }
            
            if (!errors && savedOrders.length > 0) {
                // Show success notification
                showPaymentSuccess(savedOrders.length);
                
                // Clear cart
                cart = [];
                localStorage.setItem('kawasakiCart', JSON.stringify(cart));
                
                // Redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = '/my_bookings';
                }, 3000);
            } else {
                alert('Payment failed! Please try again.');
                payBtn.innerHTML = originalText;
                payBtn.disabled = false;
            }
        }
        
        function showPaymentSuccess(itemCount) {
            // Create success modal
            const modalHtml = `
                <div class="modal fade" id="successModal" tabindex="-1" data-bs-backdrop="static">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content text-center p-4">
                            <div class="modal-body">
                                <i class="fas fa-check-circle" style="font-size: 80px; color: #28a745;"></i>
                                <h3 class="mt-3">Payment Successful!</h3>
                                <p class="mt-3">Your order has been placed successfully.</p>
                                <p><strong>${itemCount} item(s) ordered</strong></p>
                                <p class="text-muted">Payment Method: ${selectedPayment.toUpperCase()}</p>
                                <div class="alert alert-success mt-3">
                                    <i class="fas fa-truck"></i> Your order will be delivered within 5-7 business days
                                </div>
                                <button class="btn btn-success mt-3" data-bs-dismiss="modal" onclick="window.location.href='/my_bookings'">
                                    View My Orders
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Remove existing modal if any
            const existingModal = document.getElementById('successModal');
            if (existingModal) existingModal.remove();
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = new bootstrap.Modal(document.getElementById('successModal'));
            modal.show();
        }
        
        // Initialize page
        if (cart.length === 0) {
            document.getElementById('orderItems').innerHTML = '<div class="alert alert-warning">Your cart is empty. <a href="/parts">Shop Now</a></div>';
            document.getElementById('payBtn').disabled = true;
        } else {
            displayOrderSummary();
            selectPayment('card');
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
