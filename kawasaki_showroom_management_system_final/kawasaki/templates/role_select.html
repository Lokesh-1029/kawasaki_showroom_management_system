<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - Kawasaki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px;
        }
        .role-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .role-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .role-card i {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .role-card.customer i {
            color: #00ff00;
        }
        .role-card.admin i {
            color: #ff6b6b;
        }
        .role-card h2 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .role-card p {
            color: #666;
            margin-bottom: 0;
        }
        .role-card .badge {
            margin-top: 15px;
            padding: 5px 15px;
            font-size: 12px;
        }
        .user-info {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: center;
            color: white;
        }
        .btn-back {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .role-card { margin: 10px; padding: 25px; }
            .role-card i { font-size: 50px; }
        }
    </style>
</head>
<body>
    <button class="btn-back" onclick="window.location.href='/home'">
        <i class="fas fa-arrow-left"></i> Back
    </button>

    <div class="container">
        <div class="user-info">
            <i class="fas fa-user-circle fa-2x mb-2"></i>
            <h4>Welcome, {{ user.full_name }}</h4>
            <p class="mb-0">Select how you want to access the dashboard</p>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="role-card customer" onclick="selectRole('customer')">
                    <i class="fas fa-user"></i>
                    <h2>Customer Dashboard</h2>
                    <p>View bikes, book test rides, shop parts</p>
                    <span class="badge bg-success">Recommended</span>
                </div>
            </div>
            <div class="col-md-6">
                <div class="role-card admin" onclick="selectRole('admin')">
                    <i class="fas fa-user-shield"></i>
                    <h2>Admin Dashboard</h2>
                    <p>Manage users, bikes, bookings, and inventory</p>
                    <span class="badge bg-danger">Restricted Access</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    function selectRole(role) {
        if (role === 'customer') {
            window.location.href = '/dashboard';
        } else {
            // Show admin login modal
            const adminPassword = prompt('Enter Admin Password to access Admin Dashboard:');
            if (adminPassword === 'admin123') {
                // First, verify with server
                fetch('/verify_admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPassword })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        if (data.requires_otp) {
                            window.location.href = '/admin/otp_page';
                        } else {
                            window.location.href = '/admin_dashboard';
                        }
                    } else {
                        alert('Invalid admin password! Access denied.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error verifying admin access. Please try again.');
                });
            } else if (adminPassword !== null) {
                alert('Invalid admin password! Access denied.');
            }
        }
    }
</script>
</body>
</html>
