<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Kawasaki Clothing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: black; padding: 15px 0; }
        .navbar-brand { color: #00ff00 !important; font-size: 24px; font-weight: bold; }
        .confirmation-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .cart-item {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .payment-method {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .payment-method:hover, .payment-method.selected {
            border-color: #00ff00;
            background: #e8f5e9;
        }
        .btn-pay {
            background: #28a745;
            color: white;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        .btn-pay:hover { background: #218838; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/home"><i class="fas fa-motorcycle"></i> KAWASAKI</a>
            <div>
                <a href="/clothing" class="btn btn-outline-light me-2">Back to Shop</a>
                <a href="/home" class="btn btn-outline-light">Home</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="confirmation-card">
            <div class="text-center mb-4">
                <i class="fas fa-shopping-cart" style="font-size: 60px; color: #00ff00;"></i>
                <h2 class="mt-3">Order Summary</h2>
                <p class="text-muted">Please review your clothing order before payment</p>
            </div>
            
            <div class="row">
                <div class="col-md-8 offset-md-2">
                    <h5>Your Items</h5>
                    <div id="orderItems"></div>
                    
                    <div class="mt-4 p-3 bg-light rounded">
                        <div class="d-flex justify-content-between">
                            <strong>Subtotal:</strong>
                            <span>₹<span id="subtotal">0</span></span>
                        </div>
                        <div class="d-flex justify-content-between mt-2">
                            <strong>GST (18%):</strong>
                            <span>₹<span id="gstAmount">0</span></span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <strong>Total Amount:</strong>
                            <strong class="text-success">₹<span id="totalAmount">0</span></strong>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <h5>Select Payment Method</h5>
                        <div class="payment-method" onclick="selectPayment(this, 'card')">
                            <i class="fas fa-credit-card"></i> Credit/Debit Card
                        </div>
                        <div class="payment-method" onclick="selectPayment(this, 'upi')">
                            <i class="fas fa-mobile-alt"></i> UPI (Google Pay, PhonePe)
                        </div>
                        <div class="payment-method" onclick="selectPayment(this, 'cod')">
                            <i class="fas fa-money-bill-wave"></i> Cash on Delivery
                        </div>
                    </div>
                    
                    <button class="btn-pay" onclick="completePayment()">
                        <i class="fas fa-lock"></i> Pay Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('kawasakiCart')) || [];
        let selectedPayment = null;

        function displayOrder() {
            if (cart.length === 0) {
                document.getElementById('orderItems').innerHTML = '<div class="alert alert-warning">Your cart is empty. <a href="/clothing">Shop Now</a></div>';
                return;
            }
            
            let html = '';
            let subtotal = 0;
            
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                html += `
                    <div class="cart-item">
                        <div>
                            <h6>${item.name}</h6>
                            <small>Size: ${item.size} | Color: ${item.color} | Quantity: ${item.quantity}</small>
                        </div>
                        <div class="fw-bold">₹${itemTotal.toLocaleString()}</div>
                    </div>
                `;
            });
            
            const gst = subtotal * 0.18;
            const total = subtotal + gst;
            
            document.getElementById('orderItems').innerHTML = html;
            document.getElementById('subtotal').innerText = subtotal.toLocaleString();
            document.getElementById('gstAmount').innerText = Math.round(gst).toLocaleString();
            document.getElementById('totalAmount').innerText = Math.round(total).toLocaleString();
        }
        
        function selectPayment(element, method) {
            document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedPayment = method;
        }
        
        async function completePayment() {
            if (!selectedPayment) {
                alert('Please select a payment method');
                return;
            }
            
            if (cart.length === 0) {
                alert('Your cart is empty!');
                window.location.href = '/clothing';
                return;
            }
            
            const payBtn = event.target;
            const originalText = payBtn.innerHTML;
            payBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            payBtn.disabled = true;
            
            let processed = 0;
            let successCount = 0;
            
            for (let item of cart) {
                try {
                    const response = await fetch('/api/place_clothing_order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            product_name: item.name,
                            size: item.size,
                            quantity: item.quantity,
                            price: item.price,
                            payment_method: selectedPayment
                        })
                    });
                    const data = await response.json();
                    if (data.success) successCount++;
                } catch (error) {
                    console.error('Error:', error);
                }
                processed++;
                
                if (processed === cart.length) {
                    if (successCount === cart.length) {
                        showSuccessModal(successCount, selectedPayment);
                        localStorage.removeItem('kawasakiCart');
                    } else if (successCount > 0) {
                        alert(`Partial success: ${successCount} of ${cart.length} items ordered.`);
                        window.location.reload();
                    } else {
                        alert('Failed to place order. Please try again.');
                        payBtn.innerHTML = originalText;
                        payBtn.disabled = false;
                    }
                }
            }
        }
        
        function showSuccessModal(itemCount, paymentMethod) {
            const modalHtml = `
                <div class="modal fade" id="successModal" tabindex="-1" data-bs-backdrop="static">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content text-center p-4">
                            <div class="modal-body">
                                <i class="fas fa-check-circle" style="font-size: 80px; color: #28a745;"></i>
                                <h3 class="mt-3">Order Placed Successfully!</h3>
                                <p>Your clothing order has been placed.</p>
                                <p><strong>${itemCount} item(s) ordered</strong></p>
                                <p class="text-muted">Payment: ${paymentMethod.toUpperCase()}</p>
                                <div class="alert alert-success mt-3">
                                    <i class="fas fa-truck"></i> Delivery in 5-7 business days
                                </div>
                                <button class="btn btn-success mt-3" onclick="window.location.href='/my_bookings'">
                                    View My Orders
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = new bootstrap.Modal(document.getElementById('successModal'));
            modal.show();
        }
        
        // Initialize page
        displayOrder();
    </script>
</body>
</html>
