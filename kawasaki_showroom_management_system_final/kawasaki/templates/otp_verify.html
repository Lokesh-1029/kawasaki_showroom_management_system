<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Kawasaki Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .otp-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .otp-input {
            font-size: 32px;
            letter-spacing: 10px;
            text-align: center;
            font-weight: bold;
        }
        .timer {
            color: #dc3545;
            font-weight: bold;
            font-size: 18px;
        }
        .resend-link {
            color: #00ff00;
            text-decoration: none;
            cursor: pointer;
        }
        .resend-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="otp-card">
        <i class="fas fa-shield-alt fa-4x text-success mb-3"></i>
        <h3>Admin OTP Verification</h3>
        <p class="text-muted">Enter the 6-digit OTP sent to your email</p>
        
        <form id="otpForm">
            <input type="text" class="form-control otp-input mb-3" id="otp" maxlength="6" placeholder="000000" required autofocus>
            <button type="submit" class="btn btn-success w-100 py-2" id="verifyBtn">
                <i class="fas fa-check-circle"></i> Verify OTP
            </button>
        </form>
        
        <div class="mt-3">
            <small class="text-muted">OTP expires in: <span id="timer" class="timer">5:00</span></small>
        </div>
        
        <div class="mt-2">
            <small>Didn't receive OTP? </small>
            <a href="#" id="resendBtn" class="resend-link">Resend OTP</a>
        </div>
        
        <div id="message" class="mt-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let timerInterval;
        let timeLeft = 300;
        
        function startTimer() {
            const timerElement = document.getElementById('timer');
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.innerHTML = 'EXPIRED';
                    document.getElementById('message').innerHTML = '<div class="alert alert-warning">OTP expired. Please resend.</div>';
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerElement.innerHTML = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        document.getElementById('otpForm').onsubmit = async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            const verifyBtn = document.getElementById('verifyBtn');
            
            if (otp.length !== 6) {
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">Please enter 6-digit OTP</div>';
                return;
            }
            
            verifyBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verifying...';
            verifyBtn.disabled = true;
            
            const response = await fetch('/admin/verify_otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ otp: otp })
            });
            
            const data = await response.json();
            
            if (data.success) {
                window.location.href = '/admin_dashboard';
            } else {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verify OTP';
                verifyBtn.disabled = false;
            }
        };
        
        document.getElementById('resendBtn').onclick = async (e) => {
            e.preventDefault();
            document.getElementById('message').innerHTML = '<div class="alert alert-info">Sending new OTP...</div>';
            
            const response = await fetch('/admin/resend_otp', { method: 'POST' });
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('message').innerHTML = '<div class="alert alert-success">New OTP sent to your email!</div>';
                timeLeft = 300;
                clearInterval(timerInterval);
                startTimer();
                document.getElementById('otp').value = '';
                document.getElementById('otp').focus();
            } else {
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">Failed to resend OTP. Try again.</div>';
            }
        };
        
        startTimer();
    </script>
</body>
</html>
