<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing & Merchandise - Kawasaki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .navbar { background: black; padding: 15px 0; position: sticky; top: 0; z-index: 1000; }
        .navbar-brand { color: #00ff00 !important; font-size: 24px; font-weight: bold; }
        .page-header { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 50px 0; text-align: center; }
        .category-tab { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
        .category-btn { background: white; border: 2px solid #ddd; padding: 12px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .category-btn.active { background: #00ff00; border-color: #00ff00; color: black; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; transition: 0.3s; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); height: 100%; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; background: #2a5298; }
        .product-card .info { padding: 20px; }
        .product-card h3 { font-size: 1rem; font-weight: bold; margin-bottom: 5px; }
        .product-card .price { color: #00ff00; font-size: 1.2rem; font-weight: bold; }
        .product-card .old-price { color: #999; text-decoration: line-through; font-size: 0.8rem; margin-left: 8px; }
        .product-card .rating { color: #ffc107; font-size: 0.8rem; margin: 8px 0; }
        .product-card select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn-add-cart { background: #00ff00; color: black; border: none; padding: 8px 15px; border-radius: 25px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-add-cart:hover { background: #00cc00; }
        .cart-sidebar { position: fixed; right: -450px; top: 0; width: 450px; height: 100vh; background: white; box-shadow: -5px 0 20px rgba(0,0,0,0.2); z-index: 2000; transition: 0.3s; overflow-y: auto; }
        .cart-sidebar.open { right: 0; }
        .cart-header { background: black; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .cart-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; gap: 15px; align-items: center; }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
        .cart-item-details { flex: 1; }
        .cart-item-quantity { display: flex; gap: 10px; margin-top: 5px; align-items: center; }
        .cart-item-quantity button { background: #f0f0f0; border: none; width: 25px; height: 25px; border-radius: 50%; font-weight: bold; }
        .cart-total { padding: 20px; background: #f8f9fa; border-top: 2px solid #00ff00; }
        .cart-toggle { position: fixed; bottom: 30px; right: 30px; background: #00ff00; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .toast-notification { position: fixed; bottom: 100px; right: 100px; background: #28a745; color: white; padding: 12px 20px; border-radius: 8px; animation: fadeInOut 2s ease; z-index: 1002; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(20px); } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; transform: translateY(20px); } }
        .modal-custom { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        .modal-custom.active { display: flex; }
        .modal-content-custom { background: white; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; }
        .payment-method { display: flex; align-items: center; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .payment-method:hover, .payment-method.selected { border-color: #00ff00; background: #e8f5e9; }
        .btn-pay { background: #00ff00; color: black; border: none; padding: 14px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 20px; }
        .footer { background: #1a1a1a; color: #888; padding: 50px 0 20px; margin-top: 50px; text-align: center; }
        @media (max-width: 768px) { .cart-sidebar { width: 100%; right: -100%; } .category-btn { padding: 8px 12px; font-size: 12px; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/home"><i class="fas fa-motorcycle"></i> KAWASAKI</a>
            <div>
                <a href="/home" class="btn btn-outline-light me-2">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="/dashboard" class="btn btn-outline-light me-2">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="/logout" class="btn btn-outline-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1><i class="fas fa-tshirt"></i> Clothing & Merchandise</h1>
            <p>Official Kawasaki Riding Gear - Premium Quality</p>
        </div>
    </div>

    <!-- Category Tabs - SHOES REMOVED -->
    <div class="container">
        <div class="category-tab">
            <button class="category-btn active" data-cat="jackets">🧥 Riding Jackets</button>
            <button class="category-btn" data-cat="pants">👖 Riding Pants</button>
            <button class="category-btn" data-cat="gloves">🧤 Gloves</button>
            <button class="category-btn" data-cat="helmets">⛑️ Helmets</button>
        </div>
    </div>

    <!-- Products Container -->
    <div class="container py-4">
        <div class="row" id="productsContainer"></div>
    </div>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h5><i class="fas fa-shopping-cart"></i> Your Cart</h5>
            <button class="btn-close btn-close-white" onclick="closeCart()"></button>
        </div>
        <div id="cartItemsList"><div class="text-center p-4 text-muted">Your cart is empty</div></div>
        <div class="cart-total">
            <div class="d-flex justify-content-between mb-3"><h5>Total:</h5><h5 class="text-success">₹<span id="cartTotalAmount">0</span></h5></div>
            <button class="btn btn-success w-100 py-2" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Cart Toggle -->
    <div class="cart-toggle" onclick="openCart()">
        <i class="fas fa-shopping-cart fa-lg"></i>
        <span class="cart-count" id="cartItemCount">0</span>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal-custom">
        <div class="modal-content-custom">
            <div class="d-flex justify-content-between mb-3"><h4>Secure Payment</h4><button class="btn-close" onclick="closePaymentModal()"></button></div>
            <div id="paymentDetails"></div>
            <h5>Select Payment Method</h5>
            <div class="payment-method" onclick="selectPaymentMethod(this, 'card')"><i class="fas fa-credit-card fa-2x me-3"></i><div><strong>Credit/Debit Card</strong></div></div>
            <div class="payment-method" onclick="selectPaymentMethod(this, 'upi')"><i class="fas fa-mobile-alt fa-2x me-3"></i><div><strong>UPI</strong></div></div>
            <div class="payment-method" onclick="selectPaymentMethod(this, 'cod')"><i class="fas fa-money-bill-wave fa-2x me-3"></i><div><strong>Cash on Delivery</strong></div></div>
            <button class="btn-pay" onclick="completePayment()">Pay Now</button>
            <button class="btn btn-secondary w-100 mt-2" onclick="closePaymentModal()">Cancel</button>
        </div>
    </div>

    <footer class="footer"><div class="container"><p>&copy; 2026 Kawasaki Motors India</p></div></footer>

    <script>
        // ============================================
        // PRODUCTS - SHOES CATEGORY REMOVED
        // ============================================
        
        const sizePrices = { 'S': 0, 'M': 0, 'L': 500, 'XL': 800, 'XXL': 1200 };
        const colorOptions = { 'Black': 0, 'Green': 0, 'Red': 300, 'Blue': 200, 'White': 250, 'Brown': 200, 'Grey': 100, 'Yellow': 100 };

        // JACKETS
        const jacketProducts = [
            { id: 1, name: "Kawasaki Racing Jacket", basePrice: 12999, oldPrice: 15999, rating: 4.8, sizes: ["S","M","L","XL","XXL"], colors: ["Black","Green","Red"], image: "/static/images/riding_gear/jackets/jacket-1.jpg" },
            { id: 2, name: "Kawasaki Air Vented Jacket", basePrice: 9999, oldPrice: 12999, rating: 4.7, sizes: ["M","L","XL","XXL"], colors: ["Black","White"], image: "/static/images/riding_gear/jackets/jacket-2.jpg" },
            { id: 3, name: "Kawasaki Leather Jacket", basePrice: 15999, oldPrice: 19999, rating: 4.9, sizes: ["S","M","L","XL"], colors: ["Black","Brown"], image: "/static/images/riding_gear/jackets/jacket-3.jpg" },
            { id: 4, name: "Kawasaki Mesh Jacket", basePrice: 7999, oldPrice: 9999, rating: 4.6, sizes: ["M","L","XL","XXL"], colors: ["Black","Blue"], image: "/static/images/riding_gear/jackets/jacket-4.jpg" }
        ];

        // PANTS
        const pantsProducts = [
            { id: 101, name: "Kawasaki Racing Pants", basePrice: 8999, oldPrice: 10999, rating: 4.7, sizes: ["S","M","L","XL","XXL"], colors: ["Black"], image: "/static/images/riding_gear/pants/pant-1.jpg" },
            { id: 102, name: "Kawasaki Textile Pants", basePrice: 7499, oldPrice: 8999, rating: 4.6, sizes: ["M","L","XL","XXL"], colors: ["Black","Grey"], image: "/static/images/riding_gear/pants/pant-2.jpg" }
        ];

        // GLOVES
        const glovesProducts = [
            { id: 201, name: "Kawasaki Racing Gloves", basePrice: 3499, oldPrice: 4999, rating: 4.8, sizes: ["S","M","L","XL"], colors: ["Black","Green","Red"], image: "/static/images/riding_gear/gloves/gloves-1.jpg" },
            { id: 203, name: "Kawasaki Summer Gloves", basePrice: 1999, oldPrice: 2999, rating: 4.6, sizes: ["S","M","L","XL"], colors: ["Black","White","Green"], image: "/static/images/riding_gear/gloves/gloves-3.jpg" },
            { id: 204, name: "Kawasaki Winter Gloves", basePrice: 3999, oldPrice: 5499, rating: 4.7, sizes: ["M","L","XL"], colors: ["Black","Blue"], image: "/static/images/riding_gear/gloves/gloves-4.jpg" }
        ];

        // HELMETS
        const helmetsProducts = [
            { id: 401, name: "Kawasaki Full Face Helmet", basePrice: 5999, oldPrice: 7999, rating: 4.7, sizes: ["S","M","L","XL"], colors: ["Black","Green","White"], image: "/static/images/riding_gear/helmets/helmet-1.jpg" },
            { id: 402, name: "Kawasaki Racing Helmet", basePrice: 8999, oldPrice: 11999, rating: 4.9, sizes: ["M","L","XL"], colors: ["Black","Red","Blue"], image: "/static/images/riding_gear/helmets/helmet-2.jpg" },
            { id: 403, name: "Kawasaki Modular Helmet", basePrice: 7499, oldPrice: 9999, rating: 4.6, sizes: ["S","M","L","XL"], colors: ["Black","Silver"], image: "/static/images/riding_gear/helmets/helmet-3.jpg" },
            { id: 404, name: "Kawasaki Off-Road Helmet", basePrice: 6999, oldPrice: 8999, rating: 4.7, sizes: ["S","M","L","XL"], colors: ["Black","Green","Orange"], image: "/static/images/riding_gear/helmets/helmet-4.jpg" }
        ];

        let cart = JSON.parse(localStorage.getItem('kawasakiCart')) || [];
        let selectedPaymentMethod = null;
        let cartTotal = 0;

        function getPriceRange(product) {
            let minPrice = product.basePrice;
            let maxPrice = product.basePrice;
            product.sizes.forEach(s => { if(sizePrices[s] > maxPrice - product.basePrice) maxPrice = product.basePrice + (sizePrices[s] || 0); });
            product.colors.forEach(c => { let colorVal = colorOptions[c] || 0; if(colorVal > maxPrice - product.basePrice) maxPrice = product.basePrice + colorVal; });
            if(minPrice === maxPrice) return `₹${minPrice.toLocaleString()}`;
            return `₹${minPrice.toLocaleString()} - ₹${maxPrice.toLocaleString()}`;
        }

        function displayProducts(productsArray) {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';
            productsArray.forEach(p => {
                const stars = '★'.repeat(Math.floor(p.rating)) + '☆'.repeat(5 - Math.floor(p.rating));
                const priceRange = getPriceRange(p);
                container.innerHTML += `
                    <div class="col-md-6 col-lg-3">
                        <div class="product-card">
                            <img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'; this.nextElementSibling.style.background='#2a5298'">
                            <div class="info">
                                <h3>${p.name}</h3>
                                <div class="rating">${stars} (${p.rating})</div>
                                <div class="price">${priceRange}<span class="old-price">₹${p.oldPrice.toLocaleString()}</span></div>
                                <select id="size-${p.id}">
                                    ${p.sizes.map(s => `<option value="${s}">Size: ${s} ${sizePrices[s] > 0 ? `(+₹${sizePrices[s]})` : ''}</option>`).join('')}
                                </select>
                                <select id="color-${p.id}">
                                    ${p.colors.map(c => `<option value="${c}">Color: ${c} ${colorOptions[c] > 0 ? `(+₹${colorOptions[c]})` : ''}</option>`).join('')}
                                </select>
                                <div class="stock mt-2"><i class="fas fa-check-circle text-success"></i> In Stock</div>
                                <button class="btn-add-cart mt-2" onclick='addToCart(${JSON.stringify(p)})'><i class="fas fa-cart-plus"></i> Add to Cart</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(product) {
            const sizeSelect = document.getElementById(`size-${product.id}`);
            const colorSelect = document.getElementById(`color-${product.id}`);
            const selectedSize = sizeSelect ? sizeSelect.value : product.sizes[0];
            const selectedColor = colorSelect ? colorSelect.value : product.colors[0];
            let finalPrice = product.basePrice + (sizePrices[selectedSize] || 0) + (colorOptions[selectedColor] || 0);
            
            let cart = JSON.parse(localStorage.getItem('kawasakiCart')) || [];
            const existingItem = cart.find(item => item.name === product.name && item.size === selectedSize && item.color === selectedColor);
            
            if (existingItem) {
                existingItem.quantity++;
                showToast(`${product.name} quantity updated to ${existingItem.quantity}`);
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: finalPrice,
                    size: selectedSize,
                    color: selectedColor,
                    quantity: 1,
                    image: product.image
                });
                showToast(`${product.name} (${selectedSize}, ${selectedColor}) added to cart!`);
            }
            
            localStorage.setItem('kawasakiCart', JSON.stringify(cart));
            updateCart();
            openCart();
        }

        function updateCart() {
            let cart = JSON.parse(localStorage.getItem('kawasakiCart')) || [];
            const itemsDiv = document.getElementById('cartItemsList');
            const totalSpan = document.getElementById('cartTotalAmount');
            const countSpan = document.getElementById('cartItemCount');
            
            if (cart.length === 0) {
                itemsDiv.innerHTML = '<div class="text-center p-4 text-muted">Your cart is empty</div>';
                totalSpan.innerText = '0';
                countSpan.innerText = '0';
                return;
            }
            
            let total = 0;
            let itemCount = 0;
            let html = '';
            
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                itemCount += item.quantity;
                html += `<div class="cart-item">
                    <div class="cart-item-details">
                        <h6>${item.name}</h6>
                        <div>Size: ${item.size} | Color: ${item.color}</div>
                        <div>₹${item.price.toLocaleString()} x ${item.quantity}</div>
                        <div class="cart-item-quantity">
                            <button onclick="updateQuantity(${index}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity(${index}, 1)">+</button>
                            <button class="btn btn-sm btn-danger ms-2" onclick="removeItem(${index})">Remove</button>
                        </div>
                    </div>
                    <div class="fw-bold">₹${(item.price * item.quantity).toLocaleString()}</div>
                </div>`;
            });
            
            itemsDiv.innerHTML = html;
            totalSpan.innerText = total.toLocaleString();
            countSpan.innerText = itemCount;
            localStorage.setItem('kawasakiCart', JSON.stringify(cart));
        }

        function updateQuantity(index, change) {
            let cart = JSON.parse(localStorage.getItem('kawasakiCart')) || [];
            if (cart[index].quantity + change <= 0) {
                cart.splice(index, 1);
            } else {
                cart[index].quantity += change;
            }
            localStorage.setItem('kawasakiCart', JSON.stringify(cart));
            updateCart();
            if (cart.length === 0) closeCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('kawasakiCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('kawasakiCart', JSON.stringify(cart));
            updateCart();
            if (cart.length === 0) closeCart();
        }

        function openCart() {
            document.getElementById('cartSidebar').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cartSidebar').classList.remove('open');
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast-notification';
            t.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        function checkout() {
            let cart = JSON.parse(localStorage.getItem('kawasakiCart')) || [];
            if (cart.length === 0) {
                showToast('Your cart is empty!');
                return;
            }
            window.location.href = '/order_confirmation_clothing';
        }
        
        function selectPaymentMethod(el, method) { 
            document.querySelectorAll('.payment-method').forEach(e => e.classList.remove('selected')); 
            el.classList.add('selected'); 
            selectedPaymentMethod = method; 
        }
        
        function completePayment() {
            if (!selectedPaymentMethod) {
                alert('Please select a payment method');
                return;
            }
            
            let cart = JSON.parse(localStorage.getItem('kawasakiCart')) || [];
            if (cart.length === 0) {
                alert('Your cart is empty!');
                closePaymentModal();
                return;
            }
            
            const payBtn = event.target;
            const originalText = payBtn.innerHTML;
            payBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            payBtn.disabled = true;
            
            let processedItems = 0;
            let errors = false;
            let successCount = 0;
            
            cart.forEach(function(item) {
                fetch('/api/place_clothing_order', {  // CHANGED: Now using correct clothing API
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        product_name: item.name,
                        size: item.size,
                        quantity: item.quantity,
                        price: item.price,
                        payment_method: selectedPaymentMethod
                    })
                })
                .then(response => response.json())
                .then(data => {
                    processedItems++;
                    if (data.success) {
                        successCount++;
                    } else {
                        errors = true;
                    }
                    
                    if (processedItems === cart.length) {
                        if (successCount === cart.length) {
                            showPaymentSuccessModal(successCount, selectedPaymentMethod);
                            cart = [];
                            localStorage.setItem('kawasakiCart', JSON.stringify(cart));
                            updateCart();
                            closePaymentModal();
                            closeCart();
                        } else if (successCount > 0) {
                            alert(`⚠️ Partial success: ${successCount} of ${cart.length} items ordered.`);
                            window.location.reload();
                        } else {
                            alert('❌ Failed to place order. Please try again.');
                        }
                        payBtn.innerHTML = originalText;
                        payBtn.disabled = false;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    errors = true;
                    processedItems++;
                    if (processedItems === cart.length) {
                        alert('❌ Network error. Please try again.');
                        payBtn.innerHTML = originalText;
                        payBtn.disabled = false;
                    }
                });
            });
        }

        function showPaymentSuccessModal(itemCount, paymentMethod) {
            const modalHtml = `
                <div class="modal fade" id="successModal" tabindex="-1" data-bs-backdrop="static">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content text-center p-4">
                            <div class="modal-body">
                                <i class="fas fa-check-circle" style="font-size: 80px; color: #28a745;"></i>
                                <h3 class="mt-3">Order Placed Successfully!</h3>
                                <p class="mt-3">Your clothing order has been placed.</p>
                                <p><strong>${itemCount} item(s) ordered</strong></p>
                                <p class="text-muted">Payment Method: ${paymentMethod.toUpperCase()}</p>
                                <div class="alert alert-success mt-3">
                                    <i class="fas fa-truck"></i> Your order will be delivered within 5-7 business days
                                </div>
                                <button class="btn btn-success mt-3" onclick="window.location.href='/my_bookings'">
                                    View My Orders
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            const existingModal = document.getElementById('successModal');
            if (existingModal) existingModal.remove();
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = new bootstrap.Modal(document.getElementById('successModal'));
            modal.show();
        }

        function closePaymentModal() { 
            document.getElementById('paymentModal').classList.remove('active'); 
            selectedPaymentMethod = null; 
        }
        
        // Category switching
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const cat = this.getAttribute('data-cat');
                if (cat === 'jackets') displayProducts(jacketProducts);
                else if (cat === 'pants') displayProducts(pantsProducts);
                else if (cat === 'gloves') displayProducts(glovesProducts);
                else if (cat === 'helmets') displayProducts(helmetsProducts);
            });
        });

        // Initialize
        displayProducts(jacketProducts);
        updateCart();
        console.log("Page loaded - clothing page ready");
    </script>
</body>
</html>
